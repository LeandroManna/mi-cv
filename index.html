<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículum Vitae – Leandro Ariel Manna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-0">
        <div class="topbar">
            <h1>Currículum Vitae</h1>
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="languageDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    Idioma
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                    <li><a class="dropdown-item" href="#" onclick="translateCV('es')">Español</a></li>
                    <li><a class="dropdown-item" href="#" onclick="translateCV('en')">Inglés</a></li>
                    <li><a class="dropdown-item" href="#" onclick="translateCV('fr')">Francés</a></li>
                    <li><a class="dropdown-item" href="#" onclick="translateCV('de')">Alemán</a></li>
                    <li><a class="dropdown-item" href="#" onclick="translateCV('ca')">Catalán</a></li>
                    <li><a class="dropdown-item" href="#" onclick="translateCV('it')">Italiano</a></li>
                </ul>
            </div>
        </div>
        <div id="cv-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
    <script src="js/traductor.js"></script>
</body>
</html>
